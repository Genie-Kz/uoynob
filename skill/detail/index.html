<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, shrink-to-fit=no">
  <title>スキル詳細｜凡庸な イルルカSP（再現版）</title>
  <meta name="description" content="スキルのスキル構成、このスキルを持つモンスターを掲載しています。">
  <link rel="stylesheet" href="https://stackpath.bootstrapcdn.com/bootstrap/4.5.0/css/bootstrap.min.css">
  <link rel="stylesheet" href="../../assets/css/style.css">
  <script>window.SITE_ROOT = "../../";</script>
</head>
<body>
  <div id="site-header"></div>

  <main role="main">
    <div class="container-fluid">
      <div class="row">
        <div class="col-lg-9 order-lg-2">
          <nav aria-label="breadcrumb">
            <ol class="breadcrumb">
              <li class="breadcrumb-item"><a href="../../">ホーム</a></li>
              <li class="breadcrumb-item"><a href="../">スキル</a></li>
              <li class="breadcrumb-item active" aria-current="page" id="bc-name">詳細</li>
            </ol>
          </nav>
          <div id="detail-body"></div>
        </div>
        <div class="col-lg-3 order-lg-1"><div id="site-nav"></div></div>
      </div>
    </div>
  </main>

  <div id="site-footer"></div>

  <script src="https://code.jquery.com/jquery-3.5.1.min.js"></script>
  <script src="https://stackpath.bootstrapcdn.com/bootstrap/4.5.0/js/bootstrap.bundle.min.js"></script>
  <script src="../../assets/js/common.js"></script>
  <script>
  (function () {
    var B = window.Bonyou;
    var id = new URLSearchParams(location.search).get('id') || '';
    var box = document.getElementById('detail-body');

    function render(s, monsterIndex) {
      document.title = s.name + '（スキル）｜凡庸な イルルカSP（再現版）';
      document.getElementById('bc-name').textContent = s.name;

      // スキル構成
      var comp = s.composition.map(function (c) {
        var guard = /ガード＋$/.test(c.name);
        var badge = guard ? ' <span class="badge badge-info">耐性+2</span>' : (c.type === 'attribute' ? ' <span class="badge badge-light">特性</span>' : '');
        return '<li class="list-group-item py-2">' + B.esc(c.name) + badge + '</li>';
      }).join('');

      // このスキルを持つモンスター
      var mon = s.monsters.map(function (mo) {
        var rid = monsterIndex.resolve(mo.id);
        if (rid) return '<a class="badge badge-light border p-2 mr-1 mb-1" href="' + B.ROOT + 'monster/detail/?id=' + B.esc(rid) + '">' + B.esc(mo.name) + '</a>';
        return '<span class="badge badge-light border p-2 mr-1 mb-1">' + B.esc(mo.name) + '</span>';
      }).join('');

      box.innerHTML =
        '<div class="card mb-3"><div class="card-body">' +
          '<h1 class="h4 mb-1">' + B.esc(s.name) + '</h1>' +
          '<span class="badge badge-secondary mr-1">No.' + B.esc(s.id) + '</span>' +
          '<span class="badge badge-info">' + B.esc(s.category) + '</span>' +
        '</div></div>' +

        '<h2 class="h5">スキル構成</h2>' +
        '<ul class="list-group mb-4">' + comp + '</ul>' +

        '<h2 class="h5">このスキルを持つモンスター <small class="text-muted">' + s.monsters.length + ' 体</small></h2>' +
        '<div>' + (mon || '<span class="text-muted">なし</span>') + '</div>';
    }

    Promise.all([B.loadSkills(), B.loadMonsters()]).then(function (arr) {
      var skills = arr[0], monsters = arr[1];
      // No.(位階) → 先頭バリアントの id、および 完全idセット
      var noToFirst = {}, idSet = {};
      monsters.forEach(function (m) { idSet[m.id] = 1; if (!noToFirst[m.no]) noToFirst[m.no] = m.id; });
      var monsterIndex = { resolve: function (sid) { return idSet[sid] ? sid : (noToFirst[sid] || null); } };

      var s = skills.filter(function (x) { return x.id === id; })[0];
      if (!s) { box.innerHTML = '<div class="alert alert-warning">スキルが見つかりませんでした（id=' + B.esc(id) + '）。<a href="../">一覧へ戻る</a></div>'; return; }
      render(s, monsterIndex);
    }).catch(function (e) {
      box.innerHTML = '<div class="alert alert-danger">読み込みに失敗しました: ' + B.esc(e.message) + '</div>';
    });
  })();
  </script>
</body>
</html>
