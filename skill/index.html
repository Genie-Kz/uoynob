<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, shrink-to-fit=no">
  <title>スキル一覧｜凡庸な イルルカSP（再現版）</title>
  <meta name="description" content="ドラゴンクエストモンスターズ２ イルとルカの不思議な鍵SP のスキル一覧。特技系・パラメータ系で絞り込めます。">
  <link rel="stylesheet" href="https://stackpath.bootstrapcdn.com/bootstrap/4.5.0/css/bootstrap.min.css">
  <link rel="stylesheet" href="https://cdn.datatables.net/1.11.5/css/dataTables.bootstrap4.min.css">
  <link rel="stylesheet" href="../assets/css/style.css">
  <script>window.SITE_ROOT = "../";</script>
</head>
<body>
  <div id="site-header"></div>

  <main role="main">
    <div class="container-fluid">
      <div class="row">
        <div class="col-lg-9 order-lg-2">
          <nav aria-label="breadcrumb">
            <ol class="breadcrumb">
              <li class="breadcrumb-item"><a href="../">ホーム</a></li>
              <li class="breadcrumb-item active" aria-current="page">スキル</li>
            </ol>
          </nav>

          <h1 class="h4" id="list-title">スキル一覧</h1>
          <p class="text-muted" id="list-count"></p>

          <div class="table-responsive">
            <table id="skill-table" class="table table-sm table-hover table-bordered w-100">
              <thead><tr><th>No.</th><th>スキル</th><th>カテゴリー</th><th>耐性アップ</th></tr></thead>
              <tbody></tbody>
            </table>
          </div>
        </div>

        <div class="col-lg-3 order-lg-1"><div id="site-nav"></div></div>
      </div>
    </div>
  </main>

  <div id="site-footer"></div>

  <script src="https://code.jquery.com/jquery-3.5.1.min.js"></script>
  <script src="https://stackpath.bootstrapcdn.com/bootstrap/4.5.0/js/bootstrap.bundle.min.js"></script>
  <script src="https://cdn.datatables.net/1.11.5/js/jquery.dataTables.min.js"></script>
  <script src="https://cdn.datatables.net/1.11.5/js/dataTables.bootstrap4.min.js"></script>
  <script src="../assets/js/common.js"></script>
  <script>
  (function () {
    var B = window.Bonyou;
    var cat = new URLSearchParams(location.search).get('cat') || '';
    var catName = cat === 'ability' ? '特技系' : (cat === 'parameter' ? 'パラメータ系' : '');

    function guardBadges(s) {
      var g = {};
      s.composition.forEach(function (c) { if (/ガード＋$/.test(c.name)) { var e = B.guardElement(c.name); g[e] = (g[e] || 0) + 1; } });
      var keys = Object.keys(g);
      if (!keys.length) return '';
      return keys.map(function (e) { return '<span class="badge badge-info mr-1">' + B.esc(e) + '+' + (g[e] * 2) + '</span>'; }).join('');
    }

    B.loadSkills().then(function (skills) {
      var rows = skills;
      if (catName) { rows = skills.filter(function (s) { return s.category === catName; }); document.getElementById('list-title').textContent = catName + ' のスキル'; }
      document.getElementById('list-count').textContent = rows.length + ' 件';

      $('#skill-table').DataTable({
        data: rows,
        pageLength: 50,
        lengthMenu: [[25, 50, 100, -1], [25, 50, 100, 'すべて']],
        order: [[0, 'asc']],
        language: { url: 'https://cdn.datatables.net/plug-ins/1.11.5/i18n/ja.json' },
        columns: [
          { data: 'id' },
          { data: null, render: function (s) { return '<a href="detail/?id=' + B.esc(s.id) + '">' + B.esc(s.name) + '</a>'; } },
          { data: 'category' },
          { data: null, orderable: false, render: function (s) { return guardBadges(s); } }
        ]
      });
    }).catch(function (e) {
      document.getElementById('list-count').textContent = '読み込みに失敗しました: ' + e.message;
    });
  })();
  </script>
</body>
</html>
