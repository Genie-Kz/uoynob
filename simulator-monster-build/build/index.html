<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, shrink-to-fit=no">
  <title>ビルドシミュレーター｜凡庸な イルルカSP（再現版）</title>
  <meta name="description" content="モンスターの特性・スキル・武器鍛冶を入れ替えて最終耐性を計算します。すべてブラウザ内（クライアントサイド）で動作します。">
  <link rel="stylesheet" href="https://stackpath.bootstrapcdn.com/bootstrap/4.5.0/css/bootstrap.min.css">
  <link rel="stylesheet" href="../../assets/css/style.css">
  <script>window.SITE_ROOT = "../../";</script>
  <style>
    .slot-row { display:flex; justify-content:space-between; align-items:center; }
    #picker-list { max-height: 50vh; overflow-y:auto; display:flex; flex-wrap:wrap; }
    #picker-list .picker-item { flex: 0 0 auto; }
    .res-delta { font-size:.7rem; color:#555; display:block; }
  </style>
</head>
<body>
  <div id="site-header"></div>

  <main role="main">
    <div class="container-fluid">
      <div class="row">
        <div class="col-lg-9 order-lg-2">
          <nav aria-label="breadcrumb">
            <ol class="breadcrumb">
              <li class="breadcrumb-item"><a href="../../">ホーム</a></li>
              <li class="breadcrumb-item"><a href="../">ビルドシミュレーター</a></li>
              <li class="breadcrumb-item active" aria-current="page" id="bc-name">詳細</li>
            </ol>
          </nav>
          <div id="build-body"></div>
        </div>
        <div class="col-lg-3 order-lg-1"><div id="site-nav"></div></div>
      </div>
    </div>
  </main>

  <div id="site-footer"></div>

  <!-- 入れ替え用モーダル -->
  <div class="modal fade" id="picker-modal" tabindex="-1" role="dialog" aria-hidden="true">
    <div class="modal-dialog modal-lg modal-dialog-scrollable" role="document">
      <div class="modal-content">
        <div class="modal-header">
          <h5 class="modal-title" id="picker-title">選択</h5>
          <button type="button" class="close" data-dismiss="modal" aria-label="閉じる"><span aria-hidden="true">&times;</span></button>
        </div>
        <div class="modal-body">
          <input id="picker-search" class="form-control mb-2" type="text" placeholder="入力して絞り込み（未入力なら一覧から選択）" autocomplete="off">
          <div id="picker-list"></div>
        </div>
      </div>
    </div>
  </div>

  <script src="https://code.jquery.com/jquery-3.5.1.min.js"></script>
  <script src="https://stackpath.bootstrapcdn.com/bootstrap/4.5.0/js/bootstrap.bundle.min.js"></script>
  <script src="../../assets/js/common.js"></script>
  <script>
  (function () {
    var B = window.Bonyou;
    var EL = B.RES_ELEMENTS;
    var box = document.getElementById('build-body');
    var id = new URLSearchParams(location.search).get('id') || '';

    // 状態異常などの耐性セット
    var SIZE_SET = ['ザキ', 'どく', '呪い', 'こんらん', 'マインド', 'マヒ', 'ねむり'];
    var METAL_SET = ['どく', '呪い', 'こんらん', 'マヒ', 'ねむり'];
    var KOUDOU_SET = ['どく', '呪い', 'マインド', 'こんらん', 'マヒ', 'ねむり'];
    var SIZE_BONUS = { 'スモールボディ': 0, 'スタンダードボディ': 0, 'メガボディ': 2, 'ギガボディ': 3, '超ギガボディ': 4 };
    var SIZES = ['スモールボディ', 'スタンダードボディ', 'メガボディ', 'ギガボディ', '超ギガボディ'];

    // 状態
    var m = null, size = '', traitSlots = [], skillSlots = [], forgeSlots = [null, null, null];
    var traitMaster = [], skills = [], skillsById = {};

    /* ---- 既定の特性（サイズ別） ---- */
    function defaultTraits(sz) {
      var arr = [m['新生前特性1'], m['新生前特性2'], m['特性25'], m['特性50'], m['特性100']];
      if (sz === 'メガボディ' || sz === 'ギガボディ' || sz === '超ギガボディ') arr.push(m['メガ特性']);
      if (sz === 'ギガボディ' || sz === '超ギガボディ') arr.push(m['ギガ特性']);
      if (sz === '超ギガボディ') arr.push(m['超ギガ特性']);
      var n = B.SIZE_SLOTS[sz] - 1; // サイズ枠1つを除いた編集可能枠
      arr = arr.slice(0, n);
      while (arr.length < n) arr.push('');
      return arr.map(function (x) { return x || ''; });
    }

    /* ---- 計算 ---- */
    function compute() {
      var delta = {}; EL.forEach(function (e) { delta[e] = 0; });
      var sizeDelta = (SIZE_BONUS[size] || 0) - (SIZE_BONUS[m['サイズ特性']] || 0);
      if (sizeDelta) SIZE_SET.forEach(function (e) { delta[e] += sizeDelta; });

      var metalDone = false, koudouDone = false;
      traitSlots.forEach(function (t) {
        if (t === '全ガード＋') EL.forEach(function (e) { delta[e] += 1; });
        else if (t === 'メタルボディ' || t === 'ハードメタルボディ' || t === '超ハードメタルボディ') { if (!metalDone) { METAL_SET.forEach(function (e) { delta[e] += 1; }); metalDone = true; } }
        else if (t === 'こうどうおそい') { if (!koudouDone) { KOUDOU_SET.forEach(function (e) { delta[e] += 2; }); koudouDone = true; } }
        else if (t === 'こうどうはやい') { if (!koudouDone) { KOUDOU_SET.forEach(function (e) { delta[e] -= 2; }); koudouDone = true; } }
        else if (t === '超こうどうはやい') { if (!koudouDone) { KOUDOU_SET.forEach(function (e) { delta[e] -= 4; }); koudouDone = true; } }
      });

      skillSlots.forEach(function (s) {
        if (!s) return;
        s.composition.forEach(function (c) { if (/ガード＋$/.test(c.name)) { var e = B.guardElement(c.name); if (delta[e] != null) delta[e] += 2; } });
      });

      var f = {}; forgeSlots.forEach(function (e) { if (e) f[e] = 1; });
      Object.keys(f).forEach(function (e) { delta[e] += 1; });

      var out = {};
      EL.forEach(function (e) {
        var base = B.levelOf(m[e]);
        var cap = (m[e] === '反射') ? 7 : 6;
        var lv = Math.max(0, Math.min(cap, base + delta[e]));
        out[e] = { base: base, baseName: m[e], level: lv, name: B.nameOfLevel(lv) };
      });
      return out;
    }

    /* ---- 描画 ---- */
    function resultGrid() {
      var res = compute();
      return B.buildResGrid(function (el) {
        var r = res[el];
        var html = B.esc(B.resDisplay(r.name));
        if (r.level !== r.base) {
          var dir = r.level > r.base ? '▲' : '▼';
          html += '<span class="res-delta">' + B.esc(B.resDisplay(r.baseName)) + dir + '</span>';
        }
        return { cls: B.resClass(r.name), html: html };
      });
    }

    function traitSection() {
      var slots = traitSlots.map(function (t, i) {
        return '<li class="list-group-item slot-row py-2">' +
          '<span>' + (t ? B.esc(t) : '<span class="text-muted">（空き）</span>') + '</span>' +
          '<button type="button" class="btn btn-sm btn-outline-primary edit-trait" data-i="' + i + '">編集</button>' +
          '</li>';
      }).join('');
      return '<h2 class="h5 mt-4">特性 <small class="text-muted">' + B.SIZE_SLOTS[size] + '枠（サイズ1＋' + (B.SIZE_SLOTS[size] - 1) + '）</small></h2>' +
        '<div class="form-row mb-2"><div class="form-group col-md-5 mb-0">' +
        '<label class="mb-0 small">ボディサイズ（枠数・耐性に影響）</label>' +
        '<select id="opt-size" class="form-control form-control-sm">' +
        SIZES.map(function (s) { return '<option value="' + s + '"' + (s === size ? ' selected' : '') + '>' + s + '（特性' + B.SIZE_SLOTS[s] + '・スキル' + B.SKILL_SLOTS[s] + '）</option>'; }).join('') +
        '</select></div></div>' +
        '<ul class="list-group">' + slots + '</ul>';
    }

    function skillSection() {
      var slots = skillSlots.map(function (s, i) {
        var label = s ? (B.esc(s.name) + ' <span class="badge badge-info">' + B.esc(s.category) + '</span>') : '<span class="text-muted">（空き）</span>';
        return '<li class="list-group-item slot-row py-2">' +
          '<span>' + label + '</span>' +
          '<button type="button" class="btn btn-sm btn-outline-primary edit-skill" data-i="' + i + '">編集</button>' +
          '</li>';
      }).join('');
      return '<h2 class="h5 mt-4">スキル <small class="text-muted">' + B.SKILL_SLOTS[size] + '枠</small></h2>' +
        '<ul class="list-group">' + slots + '</ul>';
    }

    function forgeSection() {
      var slots = forgeSlots.map(function (e, i) {
        return '<li class="list-group-item slot-row py-2">' +
          '<span>鍛冶' + (i + 1) + '：' + (e ? B.esc(e) + ' <span class="badge badge-info">+1</span>' : '<span class="text-muted">（なし）</span>') + '</span>' +
          '<button type="button" class="btn btn-sm btn-outline-primary edit-forge" data-i="' + i + '">編集</button>' +
          '</li>';
      }).join('');
      return '<h2 class="h5 mt-4">武器鍛冶 <small class="text-muted">別々の耐性を3つまで・各+1</small></h2>' +
        '<ul class="list-group">' + slots + '</ul>';
    }

    function statSection() {
      function row(l, v) { return '<tr><th class="w-25">' + l + '</th><td>' + v + '</td></tr>'; }
      return '<h2 class="h5 mt-4">ステータス</h2><table class="table table-sm table-bordered"><tbody>' +
        row('ＨＰ', m['HP']) + row('ＭＰ', m['MP']) + row('攻撃力', m['攻撃力']) +
        row('守備力', m['守備力']) + row('素早さ', m['素早さ']) + row('かしこさ', m['賢さ']) +
        '</tbody></table>';
    }

    function renderAll() {
      var info = B.lineageInfo(m['系統']);
      box.innerHTML =
        '<div class="card mb-3"><div class="card-body"><div class="d-flex align-items-center">' +
          '<span class="mon-icon ' + info.cls + '" style="width:48px;height:48px;font-size:16px;">' + B.esc(m.no) + '</span>' +
          '<div class="ml-3"><h1 class="h4 mb-1">' + B.esc(m['名前']) + '</h1>' +
          '<div><span class="badge badge-secondary mr-1">No.' + B.esc(m.no) + '</span>' +
          '<span class="badge badge-info mr-1">ランク' + B.esc(m['ランク']) + '</span>' +
          '<span class="badge badge-light mr-1">' + B.esc(info.label) + '</span>' +
          '<a class="ml-2 small" href="' + B.detailUrl(m) + '">図鑑を見る</a></div></div>' +
        '</div></div></div>' +
        '<h2 class="h5">最終耐性</h2><div id="res-area">' + resultGrid() + '</div>' +
        traitSection() + skillSection() + forgeSection() + statSection();
    }

    // 耐性だけ再描画（軽量）
    function refreshResult() { document.getElementById('res-area').innerHTML = resultGrid(); }

    /* ---- モーダル ---- */
    var pickerItems = [], pickerOnSelect = null;
    function renderPickerList(q) {
      var list = pickerItems.filter(function (it) { return !q || it.label.indexOf(q) >= 0; });
      $('#picker-list').html(list.map(function (it) {
        return '<button type="button" class="btn btn-outline-primary text-left m-1 picker-item" data-v="' + B.esc(it.value) + '">' + B.esc(it.label) + '</button>';
      }).join(''));
    }
    function openPicker(title, items, onSelect) {
      $('#picker-title').text(title);
      $('#picker-search').val('');
      pickerItems = items; pickerOnSelect = onSelect;
      renderPickerList('');
      $('#picker-modal').modal('show');
      setTimeout(function () { $('#picker-search').focus(); }, 300);
    }

    /* ---- 初期化 ---- */
    Promise.all([B.loadMonsters(), B.loadSkills()]).then(function (arr) {
      var monsters = arr[0]; skills = arr[1];
      m = monsters.filter(function (x) { return x.id === id; })[0];
      if (!m) { box.innerHTML = '<div class="alert alert-warning">モンスターが見つかりませんでした（id=' + B.esc(id) + '）。<a href="../">検索へ戻る</a></div>'; return; }

      document.title = m['名前'] + '｜ビルドシミュレーター';
      document.getElementById('bc-name').textContent = m['名前'];

      // 特性マスター（全モンスターの特性フィールドから重複なく収集）
      var seen = {};
      monsters.forEach(function (x) {
        B.TRAIT_FIELDS.forEach(function (f) { var v = x[f]; if (v && !seen[v]) { seen[v] = 1; traitMaster.push(v); } });
      });
      traitMaster.sort(function (a, b) { return a.localeCompare(b, 'ja'); });

      skills.forEach(function (s) { skillsById[s.id] = s; });

      // 初期状態
      size = m['サイズ特性'];
      traitSlots = defaultTraits(size);
      skillSlots = []; for (var i = 0; i < B.SKILL_SLOTS[size]; i++) skillSlots.push(null);
      forgeSlots = [null, null, null];

      renderAll();
    }).catch(function (e) {
      box.innerHTML = '<div class="alert alert-danger">読み込みに失敗しました: ' + B.esc(e.message) + '</div>';
    });

    /* ---- イベント（委譲） ---- */
    $(document).on('change', '#opt-size', function () {
      size = this.value;
      traitSlots = defaultTraits(size);
      var n = B.SKILL_SLOTS[size];
      var ns = skillSlots.slice(0, n); while (ns.length < n) ns.push(null); skillSlots = ns;
      renderAll();
    });
    $(document).on('click', '.edit-trait', function () {
      var i = +$(this).data('i');
      var items = [{ label: '（空きにする）', value: '' }].concat(traitMaster.map(function (t) { return { label: t, value: t }; }));
      openPicker('特性を選択', items, function (v) { traitSlots[i] = v; renderAll(); });
    });
    $(document).on('click', '.edit-skill', function () {
      var i = +$(this).data('i');
      var items = [{ label: '（空きにする）', value: '' }].concat(skills.map(function (s) { return { label: s.name + '〔' + s.category + '〕', value: s.id }; }));
      openPicker('スキルを選択', items, function (v) { skillSlots[i] = v ? skillsById[v] : null; renderAll(); });
    });
    $(document).on('click', '.edit-forge', function () {
      var i = +$(this).data('i');
      var items = [{ label: '（なし）', value: '' }].concat(EL.map(function (e) { return { label: e, value: e }; }));
      openPicker('武器鍛冶を選択', items, function (v) { forgeSlots[i] = v || null; renderAll(); });
    });
    $('#picker-search').on('input', function () { renderPickerList(this.value); });
    $('#picker-list').on('click', '.picker-item', function () {
      var v = $(this).attr('data-v');
      $('#picker-modal').modal('hide');
      if (pickerOnSelect) pickerOnSelect(v);
    });
  })();
  </script>
</body>
</html>
