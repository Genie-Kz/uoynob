<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, shrink-to-fit=no">
  <title>ビルドシミュレーター｜凡庸な イルルカSP（再現版）</title>
  <meta name="description" content="モンスターを選んでビルドシミュレーターを開きます。特性・スキル・武器鍛冶を入れ替えて最終耐性を計算できます。">
  <link rel="stylesheet" href="https://stackpath.bootstrapcdn.com/bootstrap/4.5.0/css/bootstrap.min.css">
  <link rel="stylesheet" href="https://cdn.datatables.net/1.11.5/css/dataTables.bootstrap4.min.css">
  <link rel="stylesheet" href="../assets/css/style.css">
  <script>window.SITE_ROOT = "../";</script>
</head>
<body>
  <div id="site-header"></div>

  <main role="main">
    <div class="container-fluid">
      <div class="row">
        <div class="col-lg-9 order-lg-2">
          <nav aria-label="breadcrumb">
            <ol class="breadcrumb">
              <li class="breadcrumb-item"><a href="../">ホーム</a></li>
              <li class="breadcrumb-item active" aria-current="page">ビルドシミュレーター</li>
            </ol>
          </nav>

          <h1 class="h4">ビルドシミュレーター</h1>
          <p class="text-muted">モンスターを検索して一覧から選ぶと、ビルドシミュレーター画面（特性・スキル・武器鍛冶を入れ替えて最終耐性を計算）に移動します。</p>

          <input id="filter" class="form-control mb-3" type="text" placeholder="モンスター名・系統・ランクで絞り込み" autocomplete="off">

          <div class="table-responsive">
            <table id="monster-table" class="table table-sm table-hover table-bordered w-100">
              <thead><tr><th>No.</th><th>モンスター</th><th>ランク</th><th>系統</th><th>サイズ</th></tr></thead>
              <tbody></tbody>
            </table>
          </div>
        </div>

        <div class="col-lg-3 order-lg-1"><div id="site-nav"></div></div>
      </div>
    </div>
  </main>

  <div id="site-footer"></div>

  <script src="https://code.jquery.com/jquery-3.5.1.min.js"></script>
  <script src="https://stackpath.bootstrapcdn.com/bootstrap/4.5.0/js/bootstrap.bundle.min.js"></script>
  <script src="https://cdn.datatables.net/1.11.5/js/jquery.dataTables.min.js"></script>
  <script src="https://cdn.datatables.net/1.11.5/js/dataTables.bootstrap4.min.js"></script>
  <script src="../assets/js/common.js"></script>
  <script>
  (function () {
    var B = window.Bonyou;
    B.loadMonsters().then(function (data) {
      var dt = $('#monster-table').DataTable({
        data: data,
        pageLength: 50,
        lengthMenu: [[25, 50, 100, -1], [25, 50, 100, 'すべて']],
        order: [[0, 'asc']],
        language: { url: 'https://cdn.datatables.net/plug-ins/1.11.5/i18n/ja.json' },
        columns: [
          { data: null, render: function (m) {
              return B.iconHtml(m) + ' <a class="ml-1" href="' + B.buildUrl(m) + '">' + B.esc(m.no) + '</a>'; } },
          { data: null, render: function (m) {
              return '<a href="' + B.buildUrl(m) + '">' + B.esc(m['名前']) + '</a>'; } },
          { data: 'ランク' },
          { data: '系統', render: function (v) { return B.esc(B.lineageInfo(v).label); } },
          { data: 'サイズ特性' }
        ]
      });
      $('#filter').on('input', function () { dt.search(this.value).draw(); });
    });
  })();
  </script>
</body>
</html>
