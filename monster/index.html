<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, shrink-to-fit=no">
  <title>モンスター一覧｜凡庸な イルルカSP（再現版）</title>
  <meta name="description" content="ドラゴンクエストモンスターズ２ イルとルカの不思議な鍵SP のモンスター一覧。ランク・系統・サイズで絞り込めます。">
  <link rel="stylesheet" href="https://stackpath.bootstrapcdn.com/bootstrap/4.5.0/css/bootstrap.min.css">
  <link rel="stylesheet" href="https://cdn.datatables.net/1.11.5/css/dataTables.bootstrap4.min.css">
  <link rel="stylesheet" href="../assets/css/style.css">
  <script>window.SITE_ROOT = "../";</script>
</head>
<body>
  <div id="site-header"></div>

  <main role="main">
    <div class="container-fluid">
      <div class="row">
        <div class="col-lg-9 order-lg-2">
          <nav aria-label="breadcrumb">
            <ol class="breadcrumb">
              <li class="breadcrumb-item"><a href="../">ホーム</a></li>
              <li class="breadcrumb-item active" aria-current="page">モンスター</li>
            </ol>
          </nav>

          <h1 class="h4" id="list-title">モンスター一覧</h1>
          <p class="text-muted" id="list-count"></p>

          <div class="table-responsive">
            <table id="monster-table" class="table table-sm table-hover table-bordered w-100">
              <thead><tr><th>No.</th><th>モンスター</th><th>ランク</th><th>系統</th><th>サイズ</th></tr></thead>
              <tbody></tbody>
            </table>
          </div>
        </div>

        <div class="col-lg-3 order-lg-1"><div id="site-nav"></div></div>
      </div>
    </div>
  </main>

  <div id="site-footer"></div>

  <script src="https://code.jquery.com/jquery-3.5.1.min.js"></script>
  <script src="https://stackpath.bootstrapcdn.com/bootstrap/4.5.0/js/bootstrap.bundle.min.js"></script>
  <script src="https://cdn.datatables.net/1.11.5/js/jquery.dataTables.min.js"></script>
  <script src="https://cdn.datatables.net/1.11.5/js/dataTables.bootstrap4.min.js"></script>
  <script src="../assets/js/common.js"></script>
  <script>
  (function () {
    var B = window.Bonyou;
    var params = new URLSearchParams(location.search);
    var rank = (params.get('rank') || '').toUpperCase();
    var lineageSlug = params.get('lineage') || '';
    var sizeSlug = params.get('size') || '';
    var q = params.get('q') || '';

    function applyFilter(data) {
      var title = 'モンスター一覧', filtered = data;
      if (rank) {
        filtered = filtered.filter(function (m) { return m['ランク'] === rank; });
        title = 'ランク' + (B.RANK_FULL[rank] || rank) + ' のモンスター';
      } else if (lineageSlug) {
        var jp = B.LINEAGE_BY_SLUG[lineageSlug];
        filtered = filtered.filter(function (m) { return m['系統'] === jp; });
        title = (B.LINEAGE[jp] ? B.LINEAGE[jp].label : jp) + ' のモンスター';
      } else if (sizeSlug) {
        var sjp = B.SIZE_BY_SLUG[sizeSlug];
        filtered = filtered.filter(function (m) { return m['サイズ特性'] === sjp; });
        title = sjp + ' のモンスター';
      }
      if (q) {
        filtered = filtered.filter(function (m) { return m['名前'].indexOf(q) >= 0; });
        title = '「' + q + '」の検索結果';
      }
      return { title: title, rows: filtered };
    }

    B.loadMonsters().then(function (data) {
      var r = applyFilter(data);
      document.getElementById('list-title').textContent = r.title;
      document.getElementById('list-count').textContent = r.rows.length + ' 体';

      $('#monster-table').DataTable({
        data: r.rows,
        pageLength: 50,
        lengthMenu: [[25, 50, 100, -1], [25, 50, 100, 'すべて']],
        order: [[0, 'asc']],
        language: { url: 'https://cdn.datatables.net/plug-ins/1.11.5/i18n/ja.json' },
        columns: [
          { data: null, render: function (m) {
              return B.iconHtml(m) + ' <a class="ml-1" href="' + B.detailUrl(m) + '">' + B.esc(m.no) + '</a>';
            },
            type: 'string'
          },
          { data: null, render: function (m) {
              return '<a href="' + B.detailUrl(m) + '">' + B.esc(m['名前']) + '</a>';
            } },
          { data: 'ランク' },
          { data: '系統', render: function (v) { var i = B.lineageInfo(v); return B.esc(i.label); } },
          { data: 'サイズ特性' }
        ]
      });
    }).catch(function (e) {
      document.getElementById('list-count').textContent = '読み込みに失敗しました: ' + e.message;
    });
  })();
  </script>
</body>
</html>
