<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, shrink-to-fit=no">
  <title>モンスター検索｜凡庸な イルルカSP（再現版）</title>
  <meta name="description" content="モンスターを耐性・特性から検索します。すべてブラウザ内（クライアントサイド）で動作します。">
  <link rel="stylesheet" href="https://stackpath.bootstrapcdn.com/bootstrap/4.5.0/css/bootstrap.min.css">
  <link rel="stylesheet" href="../assets/css/style.css">
  <script>window.SITE_ROOT = "../";</script>
  <style>
    #resistance-grid select { font-size: .85rem; }
    #trait-list { max-height: 320px; overflow-y: auto; }
    .trait-check { display: block; }
  </style>
</head>
<body>
  <div id="site-header"></div>

  <main role="main">
    <div class="container-fluid">
      <div class="row">
        <div class="col-lg-9 order-lg-2">
          <nav aria-label="breadcrumb">
            <ol class="breadcrumb">
              <li class="breadcrumb-item"><a href="../">ホーム</a></li>
              <li class="breadcrumb-item active" aria-current="page">モンスター検索</li>
            </ol>
          </nav>

          <h1 class="h4">モンスター検索</h1>
          <p class="text-muted">モンスターを耐性・特性から検索します。「○○↑」は、その耐性以上（より強い）モンスターを対象にします。</p>

          <ul class="nav nav-tabs mb-3" role="tablist">
            <li class="nav-item"><a class="nav-link active" data-toggle="tab" href="#tab-res" role="tab">耐性を選択</a></li>
            <li class="nav-item"><a class="nav-link" data-toggle="tab" href="#tab-trait" role="tab">特性を選択</a></li>
          </ul>

          <div class="tab-content mb-3">
            <div class="tab-pane fade show active" id="tab-res" role="tabpanel">
              <div id="resistance-grid" class="row"></div>
              <button id="clear-res" type="button" class="btn btn-outline-secondary btn-sm mt-2">耐性をクリア</button>
            </div>
            <div class="tab-pane fade" id="tab-trait" role="tabpanel">
              <input id="trait-filter" class="form-control mb-2" type="text" placeholder="特性名で絞り込み">
              <div id="trait-list" class="border rounded p-2"></div>
              <div class="mt-2">
                <span id="trait-selected" class="text-muted small"></span>
                <button id="clear-trait" type="button" class="btn btn-outline-secondary btn-sm ml-2">特性をクリア</button>
              </div>
            </div>
          </div>

          <div class="mb-3">
            <button id="do-search" type="button" class="btn btn-primary">検索する</button>
            <button id="reset-all" type="button" class="btn btn-outline-secondary">すべてリセット</button>
          </div>

          <h2 class="h5">検索結果 <small id="result-count" class="text-muted"></small></h2>
          <div id="no-result" class="alert alert-warning" style="display:none;">該当するモンスターが見つかりません。</div>
          <div class="table-responsive">
            <table class="table table-sm table-hover table-bordered">
              <thead><tr><th>No.</th><th>モンスター</th><th>ランク</th><th>系統</th></tr></thead>
              <tbody id="search-result"></tbody>
            </table>
          </div>
        </div>

        <div class="col-lg-3 order-lg-1"><div id="site-nav"></div></div>
      </div>
    </div>
  </main>

  <div id="site-footer"></div>

  <script src="https://code.jquery.com/jquery-3.5.1.min.js"></script>
  <script src="https://stackpath.bootstrapcdn.com/bootstrap/4.5.0/js/bootstrap.bundle.min.js"></script>
  <script src="../assets/js/common.js"></script>
  <script>
  (function () {
    var B = window.Bonyou;
    var LEVELS = [
      { v: 'n', label: '指定なし' },
      { v: '0', label: '普通↑' },
      { v: '1', label: '軽減↑' },
      { v: '2', label: '半減↑' },
      { v: '3', label: '激減↑' },
      { v: '4', label: '無効↑' }
    ];

    // 30種の耐性セレクトを生成
    function buildResistanceSelects() {
      var html = B.RES_ELEMENTS.map(function (el, i) {
        var opts = LEVELS.map(function (l) { return '<option value="' + l.v + '">' + l.label + '</option>'; }).join('');
        return '<div class="col-6 col-md-4 col-lg-3 mb-2">' +
          '<label class="mb-0 small">' + B.esc(el) + '</label>' +
          '<select id="res-' + i + '" class="form-control form-control-sm">' + opts + '</select>' +
          '</div>';
      }).join('');
      document.getElementById('resistance-grid').innerHTML = html;
    }

    var selectedTraits = {};

    function buildTraitList(data) {
      var set = {};
      data.forEach(function (m) { B.traitsOf(m).forEach(function (t) { set[t] = 1; }); });
      var traits = Object.keys(set).sort(function (a, b) { return a.localeCompare(b, 'ja'); });
      var html = traits.map(function (t) {
        return '<label class="trait-check"><input type="checkbox" class="trait-cb" value="' + B.esc(t) + '"> ' + B.esc(t) + '</label>';
      }).join('');
      document.getElementById('trait-list').innerHTML = html;

      document.getElementById('trait-list').addEventListener('change', function (e) {
        if (e.target.classList.contains('trait-cb')) {
          if (e.target.checked) selectedTraits[e.target.value] = 1;
          else delete selectedTraits[e.target.value];
          updateTraitSelected();
        }
      });
      document.getElementById('trait-filter').addEventListener('input', function () {
        var q = this.value;
        document.querySelectorAll('#trait-list .trait-check').forEach(function (lb) {
          lb.style.display = lb.textContent.indexOf(q) >= 0 ? '' : 'none';
        });
      });
    }

    function updateTraitSelected() {
      var keys = Object.keys(selectedTraits);
      document.getElementById('trait-selected').textContent = keys.length ? ('選択中: ' + keys.join('、')) : '';
    }

    // 検索（サーバーAPIの代わりにクライアントで実行）
    function search(data) {
      var thresholds = [];
      B.RES_ELEMENTS.forEach(function (el, i) {
        var v = document.getElementById('res-' + i).value;
        if (v !== 'n') thresholds.push({ el: el, t: parseInt(v, 10) });
      });
      var traits = Object.keys(selectedTraits);

      if (thresholds.length === 0 && traits.length === 0) {
        // 条件なし → 全件は出さず、案内のみ（元サイト挙動に合わせる）
        renderResult([]);
        document.getElementById('result-count').textContent = '（耐性または特性を1つ以上指定してください）';
        return;
      }

      var rows = data.filter(function (m) {
        for (var i = 0; i < thresholds.length; i++) {
          if (B.resRank(m[thresholds[i].el]) < thresholds[i].t) return false;
        }
        if (traits.length) {
          var has = B.traitsOf(m);
          for (var j = 0; j < traits.length; j++) {
            if (has.indexOf(traits[j]) < 0) return false;
          }
        }
        return true;
      });
      renderResult(rows);
      document.getElementById('result-count').textContent = rows.length + ' 体';
    }

    function renderResult(rows) {
      var tbody = document.getElementById('search-result');
      tbody.innerHTML = rows.map(function (m) {
        var info = B.lineageInfo(m['系統']);
        return '<tr><td>' + B.iconHtml(m) + ' <a class="ml-1" href="' + B.detailUrl(m) + '">' + B.esc(m.no) + '</a></td>' +
          '<td><a href="' + B.detailUrl(m) + '">' + B.esc(m['名前']) + '</a></td>' +
          '<td>' + B.esc(m['ランク']) + '</td><td>' + B.esc(info.label) + '</td></tr>';
      }).join('');
      document.getElementById('no-result').style.display = rows.length ? 'none' : '';
    }

    function clearRes() {
      B.RES_ELEMENTS.forEach(function (el, i) { document.getElementById('res-' + i).value = 'n'; });
    }
    function clearTraits() {
      selectedTraits = {};
      document.querySelectorAll('.trait-cb').forEach(function (cb) { cb.checked = false; });
      updateTraitSelected();
    }

    buildResistanceSelects();
    B.loadMonsters().then(function (data) {
      buildTraitList(data);
      document.getElementById('do-search').addEventListener('click', function () { search(data); });
      document.getElementById('clear-res').addEventListener('click', clearRes);
      document.getElementById('clear-trait').addEventListener('click', clearTraits);
      document.getElementById('reset-all').addEventListener('click', function () {
        clearRes(); clearTraits();
        document.getElementById('search-result').innerHTML = '';
        document.getElementById('result-count').textContent = '';
        document.getElementById('no-result').style.display = 'none';
      });
    });
  })();
  </script>
</body>
</html>
